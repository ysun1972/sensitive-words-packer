name: CI Test

# 每次 push / PR 跑测试
on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    name: Test on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: '1'
        shell: pwsh
        run: |
          $env:PYTHONPATH = "src"
          python tests/test_core.py

      - name: Generate sample PDF (ubuntu/macos)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          PYTHONPATH=src python scripts/gen_sample_pdf.py

      - name: CLI smoke test (ubuntu/macos)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          PYTHONPATH=src python src/cli.py \
            -i sample/input \
            -o sample/output \
            --words sample/config/words.txt \
            --rules sample/config/rules.json \
            --mode exact,rule
          ls -la sample/output/
